# Simple set of rules for GitHub actions integration with a ROS project
#

name: Build

on:
  push:
    branches: [main, jazzy]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup ROS 2
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install Python dependencies
        # Install into the system python3 explicitly: colcon and rclpy are apt packages
        # tied to /usr/bin/python3, while the bare `python3`/`pip` on PATH may resolve to
        # the runner's hosted-toolcache Python instead. Installing there would leave the
        # test dependencies invisible to `colcon test`, and rclpy invisible to pytest.
        run: |
          /usr/bin/python3 -m pip install --break-system-packages --upgrade pip
          /usr/bin/python3 -m pip install --break-system-packages -r requirements.txt
          /usr/bin/python3 -m pip install --break-system-packages pytest pytest-mock pytest-asyncio

      - name: Install dependencies and build
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: |
            langgraph_base_ros
          target-ros2-distro: jazzy
          colcon-defaults: |
            {
              "build": {
                "mixin": ["coverage-pytest"]
              },
              "test": {
                "mixin": ["coverage-pytest"]
              }
            }
          skip-tests: false

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ros_ws/lcov/total_coverage.info,ros_ws/coveragepy/.coverage
          flags: unittests
          name: codecov-umbrella
          slug: grupo-avispa/langgraph_base_ros

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          report_type: test_results
